<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>計画書アシスタント</title>
<style>
  :root {
    --ink: #1f2a24;
    --paper: #f6f3ec;
    --moss: #4a6354;
    --moss-deep: #2f4338;
    --clay: #c4683f;
    --line: #d8d2c4;
    --mono: 'JetBrains Mono', 'Courier New', monospace;
    --serif: 'Georgia', 'Iowan Old Style', serif;
  }
  * { box-sizing: border-box; }
  body {
    margin: 0;
    font-family: var(--mono);
    background: var(--paper);
    color: var(--ink);
    line-height: 1.5;
  }
  .wrap { max-width: 1400px; margin: 0 auto; padding: 40px 24px 80px; }
  header { border-bottom: 2px solid var(--ink); padding-bottom: 20px; margin-bottom: 32px; }
  .eyebrow {
    font-size: 11px; letter-spacing: 0.2em; text-transform: uppercase;
    color: var(--moss); margin-bottom: 8px;
  }
  h1 {
    font-family: var(--serif); font-size: 38px; font-weight: 400;
    margin: 0 0 6px; letter-spacing: -0.01em;
  }
  .sub { color: #6b6256; font-size: 13px; max-width: 640px; }

  .panel {
    border: 1px solid var(--line); background: #fffdf8;
    padding: 24px; margin-bottom: 28px;
  }
  .panel h2 {
    font-size: 11px; text-transform: uppercase; letter-spacing: 0.15em;
    margin: 0 0 16px; color: var(--moss-deep); font-weight: 600;
  }
  .grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 16px; }
  .grid.full { grid-template-columns: 1fr; }
  .grid.two { grid-template-columns: 1fr 1fr; }
  @media (max-width: 900px) { .grid { grid-template-columns: repeat(2, 1fr); } }
  @media (max-width: 480px) { .grid { grid-template-columns: 1fr; } }

  label {
    display: block; font-size: 10px; text-transform: uppercase;
    letter-spacing: 0.12em; color: #8a8071; margin-bottom: 6px;
  }
  input {
    width: 100%; padding: 10px 12px; font-family: var(--mono); font-size: 14px;
    border: 1px solid var(--line); background: var(--paper); color: var(--ink);
    border-radius: 2px;
  }
  input:focus { outline: 2px solid var(--moss); outline-offset: 1px; }
  input::placeholder { color: #b3aa9b; }

  .checkbox-row { display: flex; gap: 14px; flex-wrap: wrap; margin-top: 6px; }
  .checkbox-item {
    display: flex; align-items: center; gap: 6px;
    font-size: 12px; text-transform: none; letter-spacing: normal;
    color: var(--ink); cursor: pointer;
  }
  .checkbox-item input[type="checkbox"] { width: auto; cursor: pointer; }

  .actions { display: flex; gap: 12px; margin-top: 20px; flex-wrap: wrap; align-items: center; }
  button {
    font-family: var(--mono); font-size: 12px; letter-spacing: 0.08em;
    text-transform: uppercase; padding: 12px 22px; border: none;
    cursor: pointer; border-radius: 2px; transition: transform 0.08s ease, background 0.15s ease;
  }
  button:active { transform: translateY(1px); }
  .btn-primary { background: var(--moss-deep); color: #fff; }
  .btn-primary:hover { background: var(--moss); }
  .btn-primary:disabled { background: #b9c2bb; cursor: not-allowed; }
  .btn-ghost {
    background: transparent; color: var(--moss-deep); border: 1px solid var(--moss-deep);
  }
  .btn-ghost:hover { background: var(--moss-deep); color: #fff; }
  .btn-ghost:disabled { opacity: 0.4; cursor: not-allowed; border-color: #b9c2bb; color: #b9c2bb; }

  .status { font-size: 12px; color: var(--clay); margin-top: 12px; min-height: 16px; }
  .status.ok { color: var(--moss); }

  .key-note {
    font-size: 11px; color: #9a9080; margin-top: 14px; line-height: 1.6;
    border-left: 2px solid var(--line); padding-left: 12px;
  }

  #hospitalPanelWrap h3, #routePanelWrap h3, #startToWorksitePanelWrap h3, #hotelSpotsPanelWrap h3 {
    font-size: 14px; text-transform: uppercase; letter-spacing: 0.1em;
    color: var(--moss-deep); margin: 0 0 16px;
  }
  .hospital-count { font-size: 12px; color: var(--moss-deep); font-weight: 600; margin-bottom: 10px; }
  .hospital-list { list-style: none; margin: 0; padding: 0; font-size: 12px; }
  .hospital-list li {
    display: flex; align-items: center; gap: 10px; padding: 8px 0;
    border-bottom: 1px solid var(--line);
  }
  .hospital-list li:last-child { border-bottom: none; }
  .hospital-list li span { color: #888; font-size: 11px; }
  .hospital-list li a { margin-left: auto; color: var(--clay); text-decoration: none; border-bottom: 1px dotted var(--clay); font-size: 11px; }

  .route-leg { padding: 14px 0; border-bottom: 1px solid var(--line); }
  .route-leg:last-child { border-bottom: none; }
  .route-leg-title { font-size: 13px; font-weight: 600; color: var(--moss-deep); }
  .route-leg-meta { font-size: 11px; color: #888; margin: 4px 0 12px; }
  .route-stops { display: grid; grid-template-columns: repeat(auto-fit, minmax(220px, 1fr)); gap: 20px; }
  .route-stop-group strong { font-size: 11px; color: var(--moss-deep); }
  .parking-badge { font-size: 10px; color: var(--moss-deep); border: 1px solid var(--moss); padding: 1px 6px; border-radius: 2px; }

  .spot-tabs {
    display: flex; flex-wrap: wrap; gap: 4px;
    margin-bottom: 16px; border-bottom: 1px solid var(--line); padding-bottom: 8px;
  }
  .spot-tab {
    font-family: var(--mono); font-size: 10px; text-transform: uppercase; letter-spacing: 0.05em;
    padding: 6px 10px; border: 1px solid var(--line); background: transparent;
    color: var(--moss-deep); cursor: pointer; border-radius: 2px; transition: all 0.2s ease;
  }
  .spot-tab:hover { background: var(--moss-deep); color: white; }
  .spot-tab.active { background: var(--moss-deep); color: white; font-weight: 600; }
  .spot-content { display: none; }
  .spot-content.active { display: block; }
  .btn-route { padding: 6px 10px; font-size: 10px; white-space: nowrap; }

  .ai-loading { text-align: center; padding: 40px 20px; color: #999; }
  .ai-empty { text-align: center; padding: 40px 20px; color: #b3aa9b; font-size: 11px; }

  .hotel-photo { width: 80px; height: 60px; object-fit: cover; border-radius: 2px; border: 1px solid var(--line); }
  .no-photo {
    width: 80px; height: 60px; background: #e8e4d8; border-radius: 2px;
    border: 1px solid var(--line); display: flex; align-items: center;
    justify-content: center; font-size: 10px; color: #9a9080;
  }

  .spot-thumb { width: 50px; height: 40px; }
  .no-photo.spot-thumb { font-size: 8px; }
  .spot-info { display: flex; flex-direction: column; gap: 2px; flex: 1; min-width: 0; }
  .spot-info a { margin-left: 0 !important; }
  .spot-desc { color: var(--moss-deep) !important; font-style: italic; }

  footer { margin-top: 40px; font-size: 11px; color: #b3aa9b; text-align: center; }
</style>
</head>
<body>
<div class="wrap">

  <header>
    <div class="eyebrow">現地調査 · 計画書作成</div>
    <h1>計画書アシスタント</h1>
    <p class="sub">予約済みのホテルを入力すると、現場周辺の病院・ルート・ホテル周辺スポットを取得し、計画書（.docx）を生成します。</p>
  </header>

  <div class="panel">
    <h2>現場</h2>
    <div class="grid full">
      <div>
        <label for="worksiteAddress">住所または場所名（現場）</label>
        <input id="worksiteAddress" type="text" placeholder="例: 京都駅、東京都渋谷区、大阪市北区">
      </div>
    </div>
    <div class="grid" style="margin-top: 16px;">
      <div>
        <label for="worksiteLat">緯度（任意）</label>
        <input id="worksiteLat" type="text" placeholder="35.0116">
      </div>
      <div>
        <label for="worksiteLng">経度（任意）</label>
        <input id="worksiteLng" type="text" placeholder="135.7681">
      </div>
    </div>
  </div>

  <div class="panel">
    <h2>出発地</h2>
    <div class="grid full">
      <div>
        <div class="checkbox-row">
          <label class="checkbox-item"><input type="checkbox" id="useCustomStartPoint"> 出発地を会社住所以外にする（空港・港・新幹線駅など）</label>
        </div>
        <div id="companyAddressRemark" style="font-size:11px;color:#8a8071;margin-top:6px;">出発地: 会社住所（<span id="companyAddressRemarkText">読み込み中…</span>）</div>
        <div id="companyAddressFieldWrap" style="display:none; margin-top:10px;">
          <label for="companyAddress" title="ルート確認（出発地→現場→ホテル）の出発地です。">出発地の住所</label>
          <input id="companyAddress" type="text" placeholder="例: 東京都千代田区...">
        </div>
      </div>
    </div>
  </div>

  <div class="panel">
    <h2>ホテル</h2>
    <div class="grid full">
      <div>
        <label for="hotelName">ホテル名</label>
        <input id="hotelName" type="text" placeholder="例: スーパーホテル京都駅前">
      </div>
    </div>
    <div class="grid full" style="margin-top: 16px;">
      <div>
        <label for="hotelAddress">住所（任意 — 空欄の場合はホテル名から自動検索）</label>
        <input id="hotelAddress" type="text" placeholder="例: 京都府京都市下京区...（空欄ならホテル名から自動検索）">
      </div>
    </div>
    <div class="grid" style="margin-top: 16px;">
      <div>
        <label for="hotelLat">緯度（任意）</label>
        <input id="hotelLat" type="text" placeholder="35.0116">
      </div>
      <div>
        <label for="hotelLng">経度（任意）</label>
        <input id="hotelLng" type="text" placeholder="135.7681">
      </div>
      <div>
        <label for="hotelPhone">電話番号（任意）</label>
        <input id="hotelPhone" type="text" placeholder="075-000-0000">
      </div>
      <div>
        <label for="hotelPrice">料金（任意・自由記述）</label>
        <input id="hotelPrice" type="text" placeholder="例: ¥8,000/泊">
      </div>
    </div>
    <div class="actions">
      <button class="btn-primary" id="fetchInfoBtn">情報を取得</button>
    </div>
    <div class="status" id="status"></div>
  </div>

  <div class="panel" id="startToWorksitePanelWrap" style="display:none;">
    <h3>ルート: 出発地 → 現場</h3>
    <div id="startToWorksiteMap" style="height:420px; display:none; border:1px solid var(--line); margin-bottom:20px;"></div>
    <div id="startToWorksitePanel"><div class="ai-empty">検索中…</div></div>
  </div>

  <div class="panel" id="hospitalPanelWrap" style="display:none;">
    <h3>現場周辺の病院</h3>
    <div id="hospitalPanel"><div class="ai-empty">情報を取得すると表示されます</div></div>
  </div>

  <div class="panel" id="routePanelWrap" style="display:none;">
    <h3>ルート: 現場 → <span id="routePanelHotelName">ホテル</span></h3>
    <div id="routeMap" style="height:420px; display:none; border:1px solid var(--line); margin-bottom:20px;"></div>
    <div id="routePanel"><div class="ai-empty">検索中…</div></div>
  </div>

  <div class="panel" id="hotelSpotsPanelWrap" style="display:none;">
    <h3>周辺スポット: <span id="hotelSpotsPanelHotelName">ホテル</span></h3>
    <div id="hotelSpotsPanel"><div class="ai-empty">検索中…</div></div>
  </div>

  <div class="panel">
    <h2>計画書</h2>
    <div class="actions">
      <button class="btn-primary" id="generateDocBtn" disabled>計画書を生成</button>
    </div>
    <div class="key-note">
      「情報を取得」で現場・ホテルの周辺情報を読み込んだ後、計画書（.docx）を生成できます。
    </div>
  </div>

  <footer>hotel-info</footer>
</div>

<script src="js/poi.js"></script>
<script src="js/routePlanning.js"></script>
<script src="js/documentGen.js"></script>
<script>
let scriptLoaded = false;
let googleMapsKey = '';
let defaultCompanyAddress = '';
let companyGeocodedAddress = null;
let companyLat = null;
let companyLng = null;

let worksiteLat = null;
let worksiteLng = null;

let hotelLat = null;
let hotelLng = null;

let lastHospitals = [];
let lastStartToWorksiteLeg = null;
let cachedRouteToHotel = null;
let cachedHotelSpots = null;

function setStatus(msg, ok) {
  const el = document.getElementById('status');
  el.textContent = msg;
  el.className = 'status' + (ok ? ' ok' : '');
}

// Load server config and Maps script on page load
(async function init() {
  try {
    setStatus('設定を読み込み中…');
    const res = await fetch('/api/config');
    const config = await res.json();
    googleMapsKey = config.googleMapsKey;
    defaultCompanyAddress = config.companyAddress || '';
    document.getElementById('companyAddress').value = defaultCompanyAddress;
    document.getElementById('companyAddressRemarkText').textContent =
      defaultCompanyAddress || '未設定（.envのCOMPANY_ADDRESSを確認してください）';
    if (googleMapsKey) {
      await loadMapsScript(googleMapsKey);
      setStatus('');
    } else {
      setStatus('Google Maps APIキーがサーバーに設定されていません。.envを確認してください。');
    }
  } catch (err) {
    setStatus('設定の読み込みに失敗しました: ' + err.message);
  }
})();

function loadMapsScript(key) {
  return new Promise((resolve, reject) => {
    if (scriptLoaded) return resolve();
    const script = document.createElement('script');
    script.src = `https://maps.googleapis.com/maps/api/js?key=${key}&libraries=places&language=ja`;
    script.onload = () => { scriptLoaded = true; resolve(); };
    script.onerror = () => reject(new Error('Google Mapsスクリプトの読み込みに失敗しました。APIキーをご確認ください。'));
    document.head.appendChild(script);
  });
}

// Geocodes a free-text address via the client-side Geocoder, returning
// {lat, lng} or throwing a Japanese-language error. Shared by worksite,
// company/start-point, and hotel address fields — all three need the same
// "type an address, resolve to coordinates" behavior.
async function geocodeAddress(address, notFoundMessage) {
  const geocoder = new google.maps.Geocoder();
  return new Promise((resolve, reject) => {
    geocoder.geocode({ address }, (results, status) => {
      if (status === 'OK' && results[0]) {
        const loc = results[0].geometry.location;
        resolve({ lat: loc.lat(), lng: loc.lng() });
      } else {
        reject(new Error(notFoundMessage || '住所が見つかりませんでした。'));
      }
    });
  });
}

// Geocodes the company address field once and caches the result — only
// re-geocodes if the user edits the field, so repeated "情報を取得" clicks
// don't re-hit the Geocoder for the same fixed origin.
async function ensureCompanyLocation() {
  const useCustom = document.getElementById('useCustomStartPoint').checked;
  const addressInput = useCustom
    ? document.getElementById('companyAddress').value.trim()
    : defaultCompanyAddress;
  if (!addressInput) {
    throw new Error(useCustom
      ? '出発地の住所を入力してください。'
      : '会社住所が設定されていません（.envのCOMPANY_ADDRESSを確認してください）。');
  }
  if (companyGeocodedAddress === addressInput && companyLat != null) {
    return { lat: companyLat, lng: companyLng };
  }
  const loc = await geocodeAddress(addressInput, '会社住所が見つかりませんでした。');
  companyGeocodedAddress = addressInput;
  companyLat = loc.lat;
  companyLng = loc.lng;
  return { lat: companyLat, lng: companyLng };
}

// Window 1 — shown as soon as 現場's coordinates are resolved, independent
// of the hotel. includeStops=false (default, auto-triggered) only pays for
// the cheap Routes API call; includeStops=true is triggered by the
// stop-search button. Stop search here is deliberately narrower than
// window 2's: only the 2 closest convenience stores to 現場 itself.
const START_TO_WORKSITE_STOP_OPTS = { stopTypes: ['convenience_store'], stopMode: 'destination', stopLimit: 2 };
const START_TO_WORKSITE_STOP_CATEGORIES = [
  { key: 'convenienceStores', icon: '🏪', label: 'コンビニ（現場周辺）', emptyLabel: '見つかりませんでした' },
];

async function loadStartToWorksiteRoute(includeStops) {
  if (worksiteLat == null || worksiteLng == null) return;

  const wrap = document.getElementById('startToWorksitePanelWrap');
  const panel = document.getElementById('startToWorksitePanel');
  wrap.style.display = 'block';
  if (!includeStops) panel.innerHTML = '<div class="ai-empty">ルートを検索中…</div>';

  try {
    const company = await ensureCompanyLocation();
    const worksite = { lat: worksiteLat, lng: worksiteLng };
    const leg = await fetchRouteLeg(company, worksite, includeStops, START_TO_WORKSITE_STOP_OPTS);
    lastStartToWorksiteLeg = leg;
    renderLegPanel(leg, 'startToWorksitePanel', '出発地', '現場', () => loadStartToWorksiteRoute(true), {
      stopCategories: START_TO_WORKSITE_STOP_CATEGORIES,
      stopButtonLabel: '現場周辺のコンビニを検索（最寄り2件）',
    });
    renderLegMap(leg, company, worksite, '出発地', '現場', 'startToWorksiteMap');
  } catch (err) {
    panel.innerHTML = `<div class="ai-empty">${err.message}</div>`;
  }
}

async function loadRouteToHotel(includeStops) {
  if (worksiteLat == null || hotelLat == null) return;

  const wrap = document.getElementById('routePanelWrap');
  const panel = document.getElementById('routePanel');
  const hotelName = document.getElementById('hotelName').value.trim() || 'ホテル';
  document.getElementById('routePanelHotelName').textContent = hotelName;
  wrap.style.display = 'block';
  if (!includeStops) panel.innerHTML = '<div class="ai-empty">ルートを検索中…</div>';

  const worksite = { lat: worksiteLat, lng: worksiteLng };
  const hotelLoc = { lat: hotelLat, lng: hotelLng };
  const leg = await fetchRouteLeg(worksite, hotelLoc, includeStops);
  cachedRouteToHotel = leg;
  renderLegPanel(leg, 'routePanel', '現場', hotelName, () => loadRouteToHotel(true));
  renderLegMap(leg, worksite, hotelLoc, '現場', hotelName, 'routeMap');
}

async function loadHotelSpots() {
  if (hotelLat == null || hotelLng == null) return;

  const wrap = document.getElementById('hotelSpotsPanelWrap');
  const panel = document.getElementById('hotelSpotsPanel');
  const hotelName = document.getElementById('hotelName').value.trim() || 'ホテル';
  document.getElementById('hotelSpotsPanelHotelName').textContent = hotelName;
  wrap.style.display = 'block';
  panel.innerHTML = '<div class="ai-empty">周辺スポットを検索中…</div>';

  const spots = await fetchHotelSpots(hotelLat, hotelLng);
  cachedHotelSpots = spots;
  renderHotelSpotsPanel(spots, 'hotelSpotsPanel');
}

async function resolveWorksite() {
  const manualLat = parseFloat(document.getElementById('worksiteLat').value);
  const manualLng = parseFloat(document.getElementById('worksiteLng').value);
  if (!isNaN(manualLat) && !isNaN(manualLng)) {
    worksiteLat = manualLat; worksiteLng = manualLng;
    return;
  }
  const addr = document.getElementById('worksiteAddress').value.trim();
  if (!addr) throw new Error('現場の住所または緯度・経度を入力してください。');
  const loc = await geocodeAddress(addr, '現場の住所が見つかりませんでした。');
  worksiteLat = loc.lat; worksiteLng = loc.lng;
}

// Precedence: (a) manual lat/lng override always wins, unchanged; (b) an
// address typed in #hotelAddress is geocoded as before, unchanged; (c) if
// both are blank, fall back to a server-side Places Text Search by hotel
// name, biased toward the already-resolved worksite (resolveWorksite() runs
// before this — see fetchInfo() — so worksiteLat/worksiteLng are always set
// here). Phone auto-fill only ever fills an EMPTY #hotelPhone — never
// overwrites a value the user already typed, since the user's own entry is
// more trustworthy than a Places-API guess at disambiguating chains.
async function resolveHotel() {
  const name = document.getElementById('hotelName').value.trim();
  if (!name) throw new Error('ホテル名を入力してください。');

  const manualLat = parseFloat(document.getElementById('hotelLat').value);
  const manualLng = parseFloat(document.getElementById('hotelLng').value);
  const addr = document.getElementById('hotelAddress').value.trim();

  if (!isNaN(manualLat) && !isNaN(manualLng)) {
    hotelLat = manualLat; hotelLng = manualLng;
    return;
  }

  if (addr) {
    const loc = await geocodeAddress(addr, 'ホテルの住所が見つかりませんでした。');
    hotelLat = loc.lat; hotelLng = loc.lng;
    return;
  }

  const found = await fetchHotelByName(name, worksiteLat, worksiteLng);
  if (!found) {
    throw new Error('ホテル名から住所を自動検索できませんでした。住所を直接入力してください。');
  }
  document.getElementById('hotelAddress').value = found.address;
  hotelLat = found.lat; hotelLng = found.lng;
  const phoneField = document.getElementById('hotelPhone');
  if (!phoneField.value.trim() && found.phone) phoneField.value = found.phone;
}

async function fetchInfo() {
  if (!scriptLoaded) return setStatus('Google Mapsの読み込みが完了していません。しばらくお待ちください。');

  const btn = document.getElementById('fetchInfoBtn');
  btn.disabled = true;
  // Stale-data guard: a second "情報を取得" click (e.g. after editing the
  // worksite or hotel address) must not let previous-session route/
  // hospital/spot data leak into a 計画書 generated afterward.
  lastHospitals = [];
  lastStartToWorksiteLeg = null;
  cachedRouteToHotel = null;
  cachedHotelSpots = null;
  document.getElementById('routePanelWrap').style.display = 'none';
  document.getElementById('hotelSpotsPanelWrap').style.display = 'none';
  document.getElementById('generateDocBtn').disabled = true;

  try {
    setStatus('現場の住所を確認中…');
    await resolveWorksite();

    setStatus('ホテルの住所を確認中…');
    await resolveHotel();

    setStatus('出発地から現場までのルートを確認中…');
    await loadStartToWorksiteRoute(false);

    setStatus('現場周辺の病院を検索中…');
    lastHospitals = await fetchWorksiteHospitals(worksiteLat, worksiteLng);
    renderHospitalPanel(lastHospitals, 'hospitalPanel');
    document.getElementById('hospitalPanelWrap').style.display = 'block';

    setStatus('現場からホテルまでのルートを確認中…');
    await loadRouteToHotel(false);

    setStatus('周辺スポットを検索中…');
    await loadHotelSpots();

    setStatus('情報を取得しました。', true);
    document.getElementById('generateDocBtn').disabled = false;
  } catch (err) {
    setStatus(err.message || '情報の取得に失敗しました。');
  } finally {
    btn.disabled = false;
  }
}

document.getElementById('useCustomStartPoint').addEventListener('change', (e) => {
  const fieldWrap = document.getElementById('companyAddressFieldWrap');
  const remark = document.getElementById('companyAddressRemark');
  if (e.target.checked) {
    fieldWrap.style.display = 'block';
    remark.style.display = 'none';
    document.getElementById('companyAddress').focus();
  } else {
    fieldWrap.style.display = 'none';
    remark.style.display = 'block';
  }
});

document.getElementById('fetchInfoBtn').addEventListener('click', fetchInfo);
document.getElementById('generateDocBtn').addEventListener('click', generateDocument);
</script>
</body>
</html>
